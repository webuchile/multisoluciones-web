<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYG INGENIERÍA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="hero-container">
        <div class="hero-left">
            <div class="logo-container">
                <div class="logo-placeholder">
                    <span class="placeholder-text">[ LOGO MULTISOLUCIONES ]</span>
                </div>
            </div>
            
            <div class="hero-content">
                <h1>FYG INGENIERÍA</h1>
                <p class="subtitle">Soluciones Integrales en Obras Civiles, Área Sanitaria y Tratamiento de Aguas</p>
            </div>
            
            <div class="hero-footer">
                <span class="date-text">Junio del 2026</span>
            </div>
        </div>

        <div class="floating-badge">
            <div class="icon-circle">
                <i class="fa-solid fa-gear"></i>
            </div>
        </div>

        <div class="hero-right">
            <div class="image-placeholder">
                <span class="placeholder-text">[ Espacio para Imagen: Planos, Casco y Herramientas ]</span>
            </div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
